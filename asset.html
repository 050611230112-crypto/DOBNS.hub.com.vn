<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOBN CAPITAL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="logo.jpg">
  </div>

  <nav>
    <a href="index.html" class="active">Homepage</a>
    <a href="client.html">Client's Information</a>
    <a href="asset.html">Asset Management</a>
    <a href="stock.html">Stock</a>
    <a href="planning.html">Financial Planning</a>
    <a href="portfolio.html">Portfolio Management</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h3>Chọn nội dung</h3>
    <button onclick="show('assets')">Assets</button>
    <button onclick="show('liabilities')">Liabilities</button>
    <button onclick="show('income')">Income</button>
    <button onclick="show('expenses')">Expenses</button>
  </div>

  <div id="assets" class="card content">Bảng Assets từ Excel</div>
  <div id="liabilities" class="card content" style="display:none">Bảng Liabilities</div>
  <div id="income" class="card content" style="display:none">Monthly Income</div>
  <div id="expenses" class="card content" style="display:none">Monthly Expenses</div>

</div>

<script>
function show(id){
  document.querySelectorAll('.content').forEach(el=>el.style.display='none');
  document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
