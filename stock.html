<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOBN CAPITAL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="logo.jpg">
  </div>

  <nav>
    <a href="index.html" class="active">Homepage</a>
    <a href="client.html">Client's Information</a>
    <a href="Objectives.html">Investment Objectives</a>
    <a href="asset.html">Asset Management</a>
    <a href="stock.html">Stock</a>
    <a href="planning.html">Financial Planning</a>
    <a href="Characteristics.html">Characteristics</a>
    <a href="portfolio.html">Portfolio Management</a>
  </nav>
</header>

  <!-- BUTTON -->
  <div class="container">
  <div class="card">
    <button onclick="loadStock('FPT')">FPT</button>
    <button onclick="loadStock('HPG')">HPG</button>
    <button onclick="loadStock('BID')">BID</button>
    <button onclick="loadStock('MWG')">MWG</button>
    <button onclick="loadStock('REE')">REE</button>
  </div>
  <!-- CONTENT -->
  <div id="stockContent" class="card">
    <h3>Chọn cổ phiếu để xem phân tích</h3>
  </div>

</div>

<script>
async function loadStock(code){

  try{
    const res = await fetch('data.json');
    const data = await res.json();
    const stock = data[code];

    if(!stock){
      document.getElementById('stockContent').innerHTML = "<h3>Không có dữ liệu</h3>";
      return;
    }

    let html = `
    <div style="display:flex; gap:20px; align-items:center;">
      <img src="${stock.logo}" style="height:120px;">
      <div>
        <h2>${stock.name}</h2>
        <p>${stock.industry}</p>
      </div>
    </div>

    <h3>Market Position</h3>
    <p>${stock.market_position?.description || ""}</p>
    `;

    // ✅ FIX: tránh lỗi nếu không có business_model
    if(stock.business_model && stock.business_model.description){
      html += `
      <h3>Business Model</h3>
      <p>${stock.business_model.description}</p>
      `;
    }

    html += `
    <h3>Financial</h3>
    <p>${stock.financial?.analysis || ""}</p>
    <p>${stock.financial?.detailed_comment || ""}</p>
    `;

    // ✅ FIX: kiểm tra tồn tại trước khi dùng
    if(stock.financial && stock.financial.type === "bank"){

      html += `
      <table>
        <tr>
          <th>Year</th>
          <th>TOI</th>
          <th>ROE</th>
          <th>ROA</th>
          <th>NIM</th>
          <th>EPS</th>
          <th>NPL</th>
          <th>CAR</th>
        </tr>
      `;

      stock.financial.table.forEach(p => {
        html += `
        <tr>
          <td>${p.year}</td>
          <td>${p.toi || ""}</td>
          <td>${p.roea || ""}</td>
          <td>${p.roaa || ""}</td>
          <td>${p.nim || ""}</td>
          <td>${p.eps || ""}</td>
          <td>${p.npl || ""}</td>
          <td>${p.car || ""}</td>
        </tr>
        `;
      });

    } else {

      html += `
      <table>
        <tr>
          <th>Year</th>
          <th>Growth</th>
          <th>Profit</th>
          <th>ROE</th>
          <th>ROA</th>
          <th>EPS</th>
        </tr>
      `;

      stock.financial.table.forEach(p => {
        html += `
        <tr>
          <td>${p.year}</td>
          <td>${p.revenue_growth || ""}</td>
          <td>${p.lnst || ""}</td>
          <td>${p.roea || ""}</td>
          <td>${p.roaa || ""}</td>
          <td>${p.eps || ""}</td>
        </tr>
        `;
      });
    }

    html += `</table>

    <h3>Risk</h3>
    <p><b>Mức độ:</b> ${stock.risk?.level || ""}</p>
    <p>${stock.risk?.description || ""}</p>

    <h3>Outlook</h3>
    <p>${stock.outlook?.description || ""}</p>

    <h3>Time Horizon</h3>
    <p>${stock.time_horizon?.description || ""}</p>
    `;

    document.getElementById('stockContent').innerHTML = html;

  } catch(error){
    document.getElementById('stockContent').innerHTML = "<h3>Lỗi load dữ liệu</h3>";
    console.error(error);
  }
}
</script>
