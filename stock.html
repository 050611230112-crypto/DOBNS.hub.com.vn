<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analysis</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
  </div>

  <nav>
    <a href="index.html">Homepage</a>
    <a href="client.html">Client's Information</a>
    <a href="asset.html">Asset Management</a>
    <a href="stock.html" class="active">Stock</a>
    <a href="planning.html">Financial Planning</a>
    <a href="portfolio.html">Portfolio Management</a>
  </nav>
</header>

<div class="container">

  <!-- BUTTON -->
  <div class="card">
    <button onclick="loadStock('FPT')">FPT</button>
    <button onclick="loadStock('HPG')">HPG</button>
    <button onclick="loadStock('BID')">BID</button>
    <button onclick="loadStock('MWG')">MWG</button>
    <button onclick="loadStock('REE')">REE</button>
    <button onclick="loadStock('Stocks Price')">Stock Price</button>
    <button onclick="loadStock('Dividend History')">Dividend History</button>
  </div>

  <!-- CONTENT -->
  <div id="stockContent" class="card">
    <h3>Chọn cổ phiếu để xem phân tích</h3>
  </div>

</div>

<script>
async function loadStock(code){

  const res = await fetch('data.json');
  const data = await res.json();

  const stock = data[code];

  let html = `
  <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
    <img src="${stock.logo}" style="height:70px;">
    <div>
      <h2>${stock.name}</h2>
      <p><b>Ngành:</b> ${stock.industry}</p>
    </div>
  </div>
    <h3>Market Position</h3>
    <p>${stock.market_position.description}</p>
    <p><b>Market Cap:</b> ${stock.market_position.market_cap_2025}</p>
    <p><b>Revenue:</b> ${stock.market_position.revenue_2025}</p>

    <h3>Financial</h3>
    <p>${stock.financial.summary}</p>

    <table>
      <tr>
        <th>Year</th><th>Profit</th><th>ROE</th><th>ROA</th><th>EPS</th>
      </tr>
  `;

  stock.financial.profit_table.forEach(p => {
    html += `
      <tr>
        <td>${p.year}</td>
        <td>${p.lnst}</td>
        <td>${p.roe}</td>
        <td>${p.roa}</td>
        <td>${p.eps}</td>
      </tr>
    `;
  });

  html += `
    </table>

    <h3>Business Model</h3>
    <p>${stock.business_model}</p>

    <h3>Risk (${stock.risk.level})</h3>
    <ul>
  `;

  stock.risk.details.forEach(r => {
    html += `<li>${r}</li>`;
  });

  html += `
    </ul>

    <h3>Outlook</h3>
    <p>${stock.outlook.conclusion}</p>

    <h3>Time Horizon</h3>
    <p>${stock.time_horizon.type}</p>
  `;

  document.getElementById('stockContent').innerHTML = html;
}
</script>

</body>
</html>
