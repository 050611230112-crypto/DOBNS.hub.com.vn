  <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPT Analysis</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>DOBN Securities</span>
  </div>

  <nav>
    <a href="index.html">Homepage</a>
    <a href="client.html">Client's Information</a>
    <a href="asset.html">Asset Management</a>
    <a href="stock.html" class="active">Stock</a>
    <a href="planning.html">Financial Planning</a>
    <a href="portfolio.html">Portfolio Management</a>
  </nav>
</header>

<div class="container">

  <!-- TITLE -->
  <div class="card">
    <h2>FPT Corporation (FPT)</h2>
    <p><b>Industry:</b> Information Technology</p>
  </div>

  <!-- BUTTON NAV -->
  <div class="card">
    <button onclick="show('position')">Market Position</button>
    <button onclick="show('finance')">Financial Strength</button>
    <button onclick="show('business')">Business Model</button>
    <button onclick="show('risk')">Risk</button>
    <button onclick="show('outlook')">Outlook</button>
  </div>

  <!-- CONTENT -->

  <!-- MARKET POSITION -->
  <div id="position" class="card content">
    <h3>Market Position</h3>
    <p>FPT là doanh nghiệp công nghệ - viễn thông hàng đầu Việt Nam, hoạt động tại hơn 30 quốc gia. Công ty tập trung vào AI, Big Data, Cloud và chuyển đổi số.</p>
    <p><b>Market Cap (2024):</b> 224,338 tỷ VNĐ</p>
    <p><b>Revenue (2024):</b> 62,849 tỷ VNĐ</p>
  </div>

  <!-- FINANCIAL -->
  <div id="finance" class="card content" style="display:none">
    <h3>Financial Strength</h3>

    <h4>Revenue Growth</h4>
    <p>2020: 7.6% | 2021: 19.5% | 2022: 23.4% | 2023: 19.6% | 2024: 19.4%</p>

    <h4>Profit Growth</h4>
    <table>
      <tr>
        <th>Year</th><th>Net Profit</th><th>ROE</th><th>ROA</th><th>EPS</th>
      </tr>
      <tr><td>2020</td><td>4,423,745</td><td>19.99%</td><td>9.42%</td><td>4,744</td></tr>
      <tr><td>2021</td><td>5,349,301</td><td>21.67%</td><td>9.09%</td><td>5,065</td></tr>
      <tr><td>2022</td><td>6,491,343</td><td>22.71%</td><td>10.08%</td><td>5,252</td></tr>
      <tr><td>2023</td><td>7,788,050</td><td>23.39%</td><td>11.55%</td><td>5,471</td></tr>
      <tr><td>2024</td><td>9,427,423</td><td>23.93%</td><td>11.88%</td><td>5,704</td></tr>
    </table>

    <p>Tăng trưởng lợi nhuận ~20%/năm, ROE duy trì trên 20% → hiệu quả cao.</p>
  </div>

  <!-- BUSINESS -->
  <div id="business" class="card content" style="display:none">
    <h3>Business Model</h3>
    <p>FPT hoạt động với 3 trụ cột:</p>
    <ul>
      <li>Công nghệ</li>
      <li>Viễn thông</li>
      <li>Giáo dục</li>
    </ul>
    <p>Mô hình giúp đa dạng hóa doanh thu và giảm rủi ro.</p>
  </div>

  <!-- RISK -->
  <div id="risk" class="card content" style="display:none">
    <h3>Risk Analysis</h3>
    <ul>
      <li>Phụ thuộc thị trường nước ngoài (US, EU, Japan)</li>
      <li>Rủi ro tỷ giá</li>
      <li>Cạnh tranh công nghệ quốc tế</li>
      <li>Yêu cầu đầu tư R&D liên tục</li>
    </ul>
    <p><b>Risk Level:</b> Medium</p>
  </div>

  <!-- OUTLOOK -->
  <div id="outlook" class="card content" style="display:none">
    <h3>Outlook</h3>
    <p>Ngành IT dự báo tăng trưởng ~16% nhờ chuyển đổi số toàn cầu.</p>
    <p>FPT hưởng lợi từ chính sách chuyển đổi số tại Việt Nam.</p>
    <p><b>Time Horizon:</b> Medium - Long term</p>
  </div>

</div>

<script>
function show(id){
  document.querySelectorAll('.content').forEach(el=>el.style.display='none');
  document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
</script>
