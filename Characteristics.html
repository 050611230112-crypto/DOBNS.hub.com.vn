<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characteristics</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
  </div>

  <nav>
    <a href="index.html">Homepage</a>
    <a href="client.html">Client's Information</a>
    <a href="asset.html">Asset Management</a>
    <a href="stock.html">Stock</a>
    <a href="planning.html">Financial Planning</a>
    <a href="characteristics.html" class="active">Characteristics</a>
    <a href="portfolio.html">Portfolio Management</a>
  </nav>
</header>

<div class="container">

  <!-- SELECT YEAR -->
  <div class="card">
    <h3>Chọn năm</h3>
    <select id="yearSelect" onchange="filterData()">
      <option value="2021">2021</option>
      <option value="2022">2022</option>
      <option value="2023">2023</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="card">
    <h3>Dividend History</h3>
    <table id="dataTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>FPT</th>
          <th>HPG</th>
          <th>BID</th>
          <th>MWG</th>
          <th>REE</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>

// 🔥 DATA (bạn thêm tiếp vào đây)
const data = [
  {date:"1/1/2021", FPT:0, HPG:0, BID:0, MWG:0, REE:0},
  {date:"1/5/2021", FPT:0, HPG:500, BID:0, MWG:0, REE:0},
  {date:"1/6/2021", FPT:1000, HPG:0, BID:0, MWG:0, REE:0},
  {date:"1/8/2021", FPT:1000, HPG:0, BID:0, MWG:500, REE:0},
  {date:"1/12/2021", FPT:0, HPG:0, BID:200, MWG:0, REE:0},

  {date:"1/4/2022", FPT:0, HPG:0, BID:0, MWG:0, REE:1000},
  {date:"1/6/2022", FPT:0, HPG:500, BID:0, MWG:1000, REE:0},
  {date:"1/8/2022", FPT:1000, HPG:0, BID:0, MWG:0, REE:0},

  {date:"1/1/2023", FPT:0, HPG:0, BID:0, MWG:0, REE:0}
];

// 🔥 FILTER FUNCTION
function filterData(){
  const year = document.getElementById("yearSelect").value;
  const tbody = document.querySelector("#dataTable tbody");

  tbody.innerHTML = "";

  data.forEach(row => {
    if(row.date.includes(year)){
      let tr = `
        <tr>
          <td>${row.date}</td>
          <td>${row.FPT}</td>
          <td>${row.HPG}</td>
          <td>${row.BID}</td>
          <td>${row.MWG}</td>
          <td>${row.REE}</td>
        </tr>
      `;
      tbody.innerHTML += tr;
    }
  });
}

// load default
filterData();

</script>

</body>
</html>
