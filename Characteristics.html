<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characteristics</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
  </div>

  <nav>
    <a href="index.html">Homepage</a>
    <a href="client.html">Client's Information</a>
    <a href="asset.html">Asset Management</a>
    <a href="stock.html">Stock</a>
    <a href="planning.html">Financial Planning</a>
    <a href="characteristics.html" class="active">Characteristics</a>
    <a href="portfolio.html">Portfolio Management</a>
  </nav>
</header>

<div class="container">

  <!-- BUTTON -->
  <div class="card">
    <button onclick="setMode('price')">Price</button>
    <button onclick="setMode('dividend')">Dividend</button>
    <button onclick="setMode('return')">Return</button>
    <button onclick="setMode('expected')">Expected Return</button>
    <button onclick="setMode('cov')">Covariance</button>
    <button onclick="setMode('corr')">Correlation</button>
  </div>

  <!-- SELECT YEAR -->
  <div class="card">
    <select id="yearSelect" onchange="renderTable()">
      <option value="2021">2021</option>
      <option value="2022">2022</option>
      <option value="2023">2023</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="card">
    <h3 id="title">Data</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>FPT</th>
          <th>HPG</th>
          <th>BID</th>
          <th>MWG</th>
          <th>REE</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>

// 🔥 MODE
let currentMode = "price";

// 🔥 SAMPLE DATA (bạn thay bằng data thật)
const data = [
  {date:"1/1/2021", FPT:100, HPG:50, BID:40, MWG:60, REE:30},
  {date:"1/2/2021", FPT:110, HPG:55, BID:42, MWG:65, REE:32},
  {date:"1/3/2021", FPT:120, HPG:60, BID:45, MWG:70, REE:35},

  {date:"1/1/2022", FPT:130, HPG:65, BID:50, MWG:75, REE:40},
  {date:"1/2/2022", FPT:135, HPG:70, BID:52, MWG:80, REE:42},

  {date:"1/1/2023", FPT:140, HPG:75, BID:55, MWG:85, REE:45}
];

// 🔥 CHANGE MODE
function setMode(mode){
  currentMode = mode;
  renderTable();
}

// 🔥 CALCULATE RETURN
function calcReturn(arr){
  let result = [];
  for(let i=1;i<arr.length;i++){
    result.push(((arr[i] - arr[i-1]) / arr[i-1]).toFixed(2));
  }
  return result;
}

// 🔥 RENDER TABLE
function renderTable(){

  const year = document.getElementById("yearSelect").value;
  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  let filtered = data.filter(d => d.date.includes(year));

  // TITLE
  document.getElementById("title").innerText = currentMode.toUpperCase();

  if(currentMode === "price" || currentMode === "dividend"){

    filtered.forEach(row=>{
      tbody.innerHTML += `
      <tr>
        <td>${row.date}</td>
        <td>${row.FPT}</td>
        <td>${row.HPG}</td>
        <td>${row.BID}</td>
        <td>${row.MWG}</td>
        <td>${row.REE}</td>
      </tr>`;
    });

  }

  else if(currentMode === "return"){

    let fpt = calcReturn(filtered.map(x=>x.FPT));

    fpt.forEach((r,i)=>{
      tbody.innerHTML += `
      <tr>
        <td>${filtered[i+1].date}</td>
        <td>${r}</td>
        <td>...</td>
        <td>...</td>
        <td>...</td>
        <td>...</td>
      </tr>`;
    });

  }

  else if(currentMode === "expected"){
    tbody.innerHTML = `<tr><td colspan="6">Expected Return (tính trung bình)</td></tr>`;
  }

  else if(currentMode === "cov"){
    tbody.innerHTML = `<tr><td colspan="6">Covariance Matrix</td></tr>`;
  }

  else if(currentMode === "corr"){
    tbody.innerHTML = `<tr><td colspan="6">Correlation Matrix</td></tr>`;
  }

}

// load lần đầu
renderTable();

</script>

</body>
</html>
