<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thị Trường Cổ Phiếu - DOBN Capital</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <a href="index.html" class="text-emerald-400 hover:underline mb-6 inline-block">← Quay lại trang chủ</a>
        <h1 class="text-3xl font-black text-amber-400 mb-8 text-center">TRUNG TÂM PHÂN TÍCH DOANH NGHIỆP</h1>

        <div class="flex justify-center space-x-4 mb-12">
            <button onclick="switchTab('analysis')" id="tabBtnAnalysis" class="px-6 py-3 font-bold rounded-xl bg-emerald-500 text-slate-900 transition shadow-lg">
                📁 Analysis Report (32 Mã Báo Cáo)
            </button>
            <button onclick="switchTab('price')" id="tabBtnPrice" class="px-6 py-3 font-bold rounded-xl bg-slate-800 border border-slate-700 text-white transition">
                📈 Stock Price (Biểu Đồ Biến Động Giá)
            </button>
        </div>

        <div id="analysisSection" class="block">
            <h2 class="text-xl font-bold text-slate-300 mb-6 text-center">Chọn mã cổ phiếu để xem báo cáo phân tích định giá chi tiết (PDF):</h2>
            <div id="grid32Stocks" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-4">
                </div>
        </div>

        <div id="priceSection" class="hidden max-w-3xl mx-auto bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-xl font-bold text-slate-200 mb-4">Tra Cứu Biến Động Giá Cổ Phiếu</h2>
            <div class="mb-6">
                <label class="block text-sm text-slate-400 mb-1">Chọn công ty hoặc mã cổ phiếu cần xem:</label>
                <select id="stockPriceSelect" onchange="updateChartPrice()" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white">
                    </select>
            </div>
            <div class="relative bg-slate-950 p-4 rounded-xl border border-slate-800">
                <canvas id="priceLineChart"></canvas>
            </div>
        </div>
    </div>

    <script src="js/recommendation.js"></script>
    <script>
        // Khởi tạo đồ thị toàn cục
        let myChart = null;

        // Chuyển đổi qua lại giữa 2 Option
        function switchTab(tab) {
            if(tab === 'analysis') {
                document.getElementById('analysisSection').classList.remove('hidden');
                document.getElementById('priceSection').classList.add('hidden');
                document.getElementById('tabBtnAnalysis').className = "px-6 py-3 font-bold rounded-xl bg-emerald-500 text-slate-900 shadow-lg";
                document.getElementById('tabBtnPrice').className = "px-6 py-3 font-bold rounded-xl bg-slate-800 border border-slate-700 text-white";
            } else {
                document.getElementById('analysisSection').classList.add('hidden');
                document.getElementById('priceSection').classList.remove('hidden');
                document.getElementById('tabBtnPrice').className = "px-6 py-3 font-bold rounded-xl bg-emerald-500 text-slate-900 shadow-lg";
                document.getElementById('tabBtnAnalysis').className = "px-6 py-3 font-bold rounded-xl bg-slate-800 border border-slate-700 text-white";
                initChartInstance(); // Khởi tạo đồ thị
            }
        }

        // Tự động tải danh sách 32 mã cổ phiếu lên giao diện khi mở trang
        window.onload = function() {
            const grid = document.getElementById('grid32Stocks');
            const selectDropdown = document.getElementById('stockPriceSelect');
            
            // Đổ dữ liệu từ mảng 32 mã (đã khai báo trong file recommendation.js)
            stockDatabase.forEach(stock => {
                // Tạo giao diện grid cho báo cáo phân tích
                grid.innerHTML += `
                    <a href="pdfs/${stock.code}.pdf" target="_blank" class="p-3 bg-slate-800 border border-slate-700 rounded-xl text-center hover:border-amber-400 transition transform hover:-translate-y-1 block">
                        <img src="${stock.logo}" alt="${stock.code}" class="mx-auto w-10 h-10 mb-2 rounded bg-white">
                        <div class="font-bold text-white">${stock.code}</div>
                        <div class="text-[11px] text-slate-400 truncate">${stock.name}</div>
                    </a>
                `;
                // Đổ vào dropdown box xem giá
                selectDropdown.innerHTML += `<option value="${stock.code}">${stock.code} - ${stock.name}</option>`;
            });
        };

        // Hàm khởi tạo Chart.js để vẽ biểu đồ line chart
        function initChartInstance() {
            const ctx = document.getElementById('priceLineChart').getContext('2d');
            if (myChart) myChart.destroy(); // Xóa chart cũ nếu có
            
            // Giả lập dữ liệu giá 5 phiên gần nhất
            const dummyLabels = ["Phiên 1", "Phiên 2", "Phiên 3", "Phiên 4", "Phiên 5"];
            const dummyData = [120, 122, 119, 125, 128]; // Mẫu giá mặc định

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dummyLabels,
                    datasets: [{
                        label: 'Giá Đóng Cửa (Nghìn VND)',
                        data: dummyData,
                        borderColor: '#10b981', // Màu xanh lục emerald cực đẹp chuyên nghiệp
                        borderWidth: 3,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                    },
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
        }

        // Thay đổi biểu đồ khi người dùng chọn mã cổ phiếu khác nhau
        function updateChartPrice() {
            if(!myChart) return;
            const selectedCode = document.getElementById('stockPriceSelect').value;
            
            // Giả lập thuật toán sinh số ngẫu nhiên cho biểu đồ sống động tùy từng mã
            const randomData = Array.from({length: 5}, () => Math.floor(Math.random() * (150 - 50 + 1)) + 50);
            
            myChart.data.datasets[0].label = `Giá cổ phiếu ${selectedCode}`;
            myChart.data.datasets[0].data = randomData;
            myChart.update(); // Làm mới biểu đồ hành động giá
        }
    </script>
</body>
</html>
